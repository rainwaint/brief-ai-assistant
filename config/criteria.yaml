name: "Критерии оценки брифов"
description: "Расширенные критерии для студенческих проектов"
criteria:
  - id: "has_goal"
    name: "Полнота цели"
    description: "Цель проекта чётко сформулирована"
    weight: 0.20
    threshold: 0.70

  - id: "has_tasks"
    name: "Детализация задач"
    description: "Задачи конкретны и измеримы"
    weight: 0.20
    threshold: 0.65

  - id: "has_materials"
    name: "Наличие материалов"
    description: "Есть исходные данные, макеты, API или контент"
    weight: 0.15
    threshold: 0.60

  - id: "budget"
    name: "Бюджет"
    description: "Бюджет проекта определён и реалистичен"
    weight: 0.10
    threshold: 0.50

  - id: "timeline"
    name: "Сроки"
    description: "Сроки выполнения реалистичны"
    weight: 0.15
    threshold: 0.60

  - id: "team_size"
    name: "Размер команды"
    description: "Команда соответствует объёму работ"
    weight: 0.10
    threshold: 0.50

  - id: "feasibility"
    name: "Реализуемость"
    description: "Проект технически и ресурсно выполним"
    weight: 0.10
    threshold: 0.60
